name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        r: ['4.4', '4.5', 'release']
    name: R ${{ matrix.r }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      NOT_CRAN: "true"
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true

      # Install hard dependencies only (Imports/Depends/LinkingTo). presto is
      # resolved from the Remotes field in DESCRIPTION; rhdf5 from Bioconductor.
      # Heavy optional Suggests (leidenAlg, zellkonverter, SingleCellExperiment,
      # SummarizedExperiment) are intentionally left out -- the suite skips those
      # paths gracefully, and omitting leidenAlg exercises the Leiden->Louvain
      # fallback test.
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: |
            any::testthat
            any::pkgload
            any::rprojroot
            any::shinytest2
            any::chromote

      # chromote/shinytest2 need a Chrome binary for the end-to-end smoke test.
      - uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable

      - name: Run testthat suite
        shell: Rscript {0}
        run: |
          Sys.setenv(NOT_CRAN = "true")
          testthat::test_local(stop_on_failure = TRUE)

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-R${{ matrix.r }}
          path: |
            tests/testthat/_snaps
            tests/testthat/*.new
          if-no-files-found: ignore
