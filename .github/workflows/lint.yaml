name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      LINTR_ERROR_ON_LINT: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # lintr only -- no heavy project deps needed because .lintr disables
      # object_usage_linter (the one linter that would require the package
      # namespace to be loadable). Keeps this job fast.
      - name: Install lintr
        shell: Rscript {0}
        run: install.packages("lintr")

      - name: Lint
        shell: Rscript {0}
        run: lintr::lint_package()
